# Production nginx config (single-origin): terminates TLS, serves the React
# build at /, and reverse-proxies /api/* to gunicorn. Copy to nginx/nginx.conf
# on the server (replace the domain with yours). The base repo nginx/nginx.conf
# is the simpler HTTP-only/dev version.
worker_processes auto;
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;

    # WebSocket upgrade plumbing.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream ticketflow_api {
        server api:8000;
        keepalive 32;
    }

    server {
        listen 80;
        server_name ticketflow-prohorj.duckdns.org;
        location / { return 301 https://$host$request_uri; }
    }

    server {
        listen 443 ssl;
        server_name ticketflow-prohorj.duckdns.org;

        ssl_certificate     /etc/letsencrypt/live/ticketflow-prohorj.duckdns.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/ticketflow-prohorj.duckdns.org/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;

        # API under /api/* -> backend (trailing slash strips the /api prefix).
        # FastAPI runs with root_path=/api so its Swagger docs resolve correctly.
        location /api/ {
            limit_req zone=api_limit burst=40 nodelay;

            proxy_pass         http://ticketflow_api/;
            proxy_http_version 1.1;
            # WebSocket upgrade (for /api/ws/events/{id}). Required or the WS
            # handshake fails behind nginx.
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        $connection_upgrade;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Forwarded-Prefix /api;
            proxy_read_timeout 3600s;  # keep idle WS connections alive
        }

        # Server-rendered, crawler-friendly share pages + assets, served by the
        # backend (NOT the SPA): per-event OpenGraph/Twitter meta so links preview
        # on WhatsApp/LinkedIn, the dynamic OG images, sitemap and robots. These
        # pass through unstripped (the backend serves them at the root; root_path
        # only affects the /api/* docs URLs, not routing).
        location /e/        { proxy_pass http://ticketflow_api; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto $scheme; }
        location /og/       { proxy_pass http://ticketflow_api; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto $scheme; }
        location = /sitemap.xml { proxy_pass http://ticketflow_api/sitemap.xml; proxy_set_header Host $host; }
        location = /robots.txt  { proxy_pass http://ticketflow_api/robots.txt;  proxy_set_header Host $host; }

        # React single-page app
        location / {
            root /usr/share/nginx/html;
            try_files $uri /index.html;
        }
    }
}
