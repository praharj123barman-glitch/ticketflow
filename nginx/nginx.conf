# nginx reverse proxy sitting in front of gunicorn.
# Responsibilities: TLS termination (add certs on the VM), connection buffering,
# basic edge rate limiting, and forwarding the real client IP so the app's
# per-IP rate limiter works correctly.

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # Edge rate-limit zone: 20 req/s per client IP with a small burst.
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;

    upstream ticketflow_api {
        server api:8000;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        # For real HTTPS on a VM, add:
        #   listen 443 ssl;
        #   ssl_certificate     /etc/letsencrypt/live/<domain>/fullchain.pem;
        #   ssl_certificate_key /etc/letsencrypt/live/<domain>/privkey.pem;

        location / {
            limit_req zone=api_limit burst=40 nodelay;

            proxy_pass         http://ticketflow_api;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        location = /health {
            proxy_pass http://ticketflow_api/health;
            access_log off;
        }
    }
}
